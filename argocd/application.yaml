apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: purge-ldl
  namespace: argocd
  finalizers:
    # Ensures Argo CD cascades deletion of managed resources when the
    # Application is deleted. Remove if you don't want that behaviour.
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/s3nthilg0pal/ubiquitous-spork.git
    targetRevision: main
    path: k8s/overlays/prod

  destination:
    server: https://kubernetes.default.svc
    namespace: purge-ldl

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        maxDuration: 3m
        factor: 2

  # The PVC's volumeName / status fields are mutated by the cluster, so
  # ignore them to keep the Application in Synced state.
  ignoreDifferences:
    - group: ""
      kind: PersistentVolumeClaim
      jsonPointers:
        - /spec/volumeName
        - /spec/storageClassName
