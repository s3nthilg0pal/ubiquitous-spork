apiVersion: v1
kind: Service
metadata:
  name: purge-ldl
  namespace: purge-ldl
  labels:
    app: purge-ldl
spec:
  type: ClusterIP
  selector:
    app: purge-ldl
  ports:
    - name: http
      port: 80
      targetPort: http
---
# Optional ingress; edit host and ingressClassName for your cluster.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: purge-ldl
  namespace: purge-ldl
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: purge-ldl.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: purge-ldl
                port:
                  number: 80
