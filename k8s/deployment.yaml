apiVersion: apps/v1
kind: Deployment
metadata:
  name: purge-ldl
  namespace: purge-ldl
  labels:
    app: purge-ldl
spec:
  # SQLite + RWO PVC means single writer. Keep replicas=1.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: purge-ldl
  template:
    metadata:
      labels:
        app: purge-ldl
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
        - name: app
          image: purge-ldl:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
            - name: DB_PATH
              value: /data/purge-ldl.db
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: purge-ldl-data
